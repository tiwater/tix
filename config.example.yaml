# Tix 配置示例
# 复制为 ~/.tix/config.yaml 并填入实际值

channels:
  # Config-driven: only channels with a block and enabled !== false are started.
  # acp:
  #   enabled: true
  #   relay_url: "https://acp-relay.example.com"
  #
  # discord:
  #   enabled: true
  #   token: "your-discord-bot-token"

  feishu:
    enabled: true
    app_id: "cli_xxxxxxxx"       # 飞书应用 App ID
    app_secret: "xxxxxxxx"       # 飞书应用 App Secret

# assistant_name: Andy          # 机器人名称，触发格式 @Andy

# Proxy (required for China; LLM calls, Discord, Feishu all use it)
# proxy: "http://127.0.0.1:7890"

# Security note:
# Tix HTTP admin/API surfaces should be protected with environment variables,
# especially whenever you expose the node beyond localhost.
#
# Recommended:
#   export HTTP_API_KEY="replace-with-a-long-random-secret"
#   export ALLOWED_ORIGINS='^https://app\.example\.com$'
#
# Development fallback:
# - if HTTP_API_KEY is unset, admin endpoints are loopback-only
# - the HTTP listener is also restricted to 127.0.0.1 in that mode
# - this is for local development only, not production

# llm:
