# Render Blueprint Specification
# See: https://render.com/docs/blueprint-spec

services:
  # 1. Backend Service (TiClaw API & Agent Hub)
  - type: web
    name: ticlaw-backend
    runtime: node
    plan: free
    buildCommand: "pnpm install && pnpm run build"
    startCommand: "node dist/index.js"
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: TICLAW_HOME
        value: "/opt/render/project/src"
      - key: HTTP_PORT
        value: "10000"
      - key: ANTHROPIC_API_KEY
        sync: false # Set in Render Dashboard
      - key: OPENROUTER_API_KEY
        sync: false

  # 2. Frontend (SvelteKit with adapter-node)
  - type: web
    name: ticlaw-frontend
    runtime: node
    plan: free
    rootDir: web
    buildCommand: "pnpm install && pnpm run build"
    startCommand: "node build/index.js"
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"
      - key: PUBLIC_BACKEND_URL
        sync: false # Set in Render Dashboard: https://ticlaw-backend.onrender.com
