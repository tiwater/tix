# Render Blueprint Specification
# See: https://render.com/docs/blueprint-spec

services:
  # 1. Claw (Agent Worker) — NOT publicly exposed
  # Connects outbound to the Hub (ticlaw-ui) via WebSocket
  - type: pserv
    name: ticlaw-claw
    runtime: node
    plan: starter # Persistent disk requires paid plan
    buildCommand: "pnpm install && pnpm run build"
    startCommand: "node dist/index.js"
    disk:
      name: ticlaw-data
      mountPath: /data/ticlaw
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: TICLAW_HOME
        value: "/data/ticlaw" # Persistent disk — survives redeploys
      - key: CLAW_HOSTNAME
        sync: false
      - key: HTTP_PORT
        value: "10000"
      - key: LLM_API_KEY
        sync: false # BigModel API key — set in Render Dashboard
      - key: LLM_BASE_URL
        value: "https://open.bigmodel.cn/api/anthropic"
      - key: HUB_URL
        value: "wss://ticlaw.onrender.com" # Hub WebSocket URL
      - key: HUB_TRUST_TOKEN
        sync: false # Set in Render Dashboard
      - key: HUB_REPORTING_INTERVAL
        value: "60000"

  # 2. Hub + Web UI (public-facing)
  # Claws connect TO this service. Users access this URL.
  - type: web
    name: ticlaw
    runtime: node
    plan: starter
    rootDir: web
    buildCommand: "pnpm install && pnpm run build"
    startCommand: "node server.js"
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"
