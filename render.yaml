# Render Blueprint Specification
# See: https://render.com/docs/blueprint-spec

services:
  # 1. Backend Service (TiClaw API & Agent Hub)
  - type: web
    name: ticlaw
    runtime: node
    plan: starter # Persistent disk requires paid plan
    buildCommand: "pnpm install && pnpm run build"
    startCommand: "node dist/index.js"
    disk:
      name: ticlaw-data
      mountPath: /data/ticlaw
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: TICLAW_HOME
        value: "/data/ticlaw" # Persistent disk — survives redeploys
      - key: CLAW_HOSTNAME
        sync: false
      - key: HTTP_PORT
        value: "10000"
      - key: LLM_API_KEY
        sync: false # BigModel API key — set in Render Dashboard
      - key: LLM_BASE_URL
        value: "https://open.bigmodel.cn/api/anthropic"
      - key: HUB_URL
        sync: false # Set in Render Dashboard for Hub Client Mode
      - key: HUB_TRUST_TOKEN
        sync: false # Set in Render Dashboard for Hub Client Mode
      - key: HUB_REPORTING_INTERVAL
        value: "60000"

  # 2. Frontend (SvelteKit with adapter-node)
  - type: web
    name: ticlaw-ui
    runtime: node
    plan: free
    rootDir: web
    buildCommand: "pnpm install && pnpm run build"
    startCommand: "node build/index.js"
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"
      - key: PUBLIC_BACKEND_URL
        sync: false # Set in Render Dashboard: https://ticlaw.onrender.com
