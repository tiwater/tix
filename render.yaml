# Render Blueprint Specification
# Deploy the public gateway. Worker nodes are launched dynamically via the
# Supen UI using the Render API (ghcr.io/tiwater/ticlaw:latest image).

services:
  - type: web
    name: ticlaw-gateway
    runtime: docker
    plan: starter
    dockerfilePath: ./packages/gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: "production"
      - key: GATEWAY_API_KEY
        sync: false
      - key: GATEWAY_SECRET
        generateValue: true
      - key: GATEWAY_ALLOWED_NODE_IDS
        sync: false

